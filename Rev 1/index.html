<!DOCTYPE html>
<html>
<head>
    <title>RIPPLE Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            font-family: Lato, sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        .section {
            margin-bottom: 20px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
        }

        #cam-stream {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 10px;
            background-color: #000;
        }

        #map {
            height: 300px;
            width: 100%;
        }

        .stat {
            font-size: 1.2em;
            font-weight: bold;
            color: #007bff;
        }

        /* Highlight for proximity alerts */
        .alert-active {
            color: #dc3545;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>RIPPLE</h1>

        <div class="section">
            <h2>Live Camera</h2>
            <img id="cam-stream" src="/video" style="transform: rotate(180deg); width: 100%;" />
        </div>

        <div class="section">
            <h2>Proximity Sensor</h2>
            <p>Object Distance: <span id="dist" class="stat">---</span> mm</p>
            <p id="prox-status">Status: Scanning...</p>
        </div>

        <div class="section">
            <h2>GPS Location</h2>
            <p>Latitude: <span id="lat" class="stat">0.000000</span></p>
            <p>Longitude: <span id="lon" class="stat">0.000000</span></p>
            <p>Satellites: <span id="sats" class="stat">0</span></p>
        </div>

        <div class="section">
            <h2>Map View</h2>
            <div id="map"></div>
        </div>
    </div>

    <script>
        // Initialize map
        var map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        var marker = null;

        function updateMap(lat, lon) {
            if (lat === 0 && lon === 0) return;

            if (marker === null) {
                marker = L.marker([lat, lon]).addTo(map);
                map.setView([lat, lon], 15);
            } else {
                marker.setLatLng([lat, lon]);
            }
        }

        // Fetch integrated data from ESP32
        function getSensorData() {
            // Updated to a generic /api/data endpoint which should return both GPS and Prox
            fetch('/api/data')
                .then(response => response.json())
                .then(data => {
                    // Update proximity
                    if (data.distance !== undefined) {
                        const distEl = document.getElementById('dist');
                        const statusEl = document.getElementById('prox-status');
                        
                        distEl.innerText = data.distance;
                        
                        // Add a visual alert if something is closer than 500mm
                        if (data.distance < 500 && data.distance > 0) {
                            distEl.classList.add('alert-active');
                            statusEl.innerText = "Status: OBJECT DETECTED";
                        } else {
                            distEl.classList.remove('alert-active');
                            statusEl.innerText = "Status: Clear";
                        }
                    }

                    // Update GPS
                    if (data.lat && data.lon) {
                        document.getElementById('lat').innerText = data.lat.toFixed(6);
                        document.getElementById('lon').innerText = data.lon.toFixed(6);
                        document.getElementById('sats').innerText = data.sats || 0;
                        updateMap(data.lat, data.lon);
                    }
                })
                .catch(error => console.log("Sensor Fetch Error:", error));
        }

        // Update every 1 second for smoother proximity tracking
        setInterval(getSensorData, 1000);
    </script>

</body>
</html>
